# overlay.toml — curated CLI metadata keyed by operationId (D17/D22).
# Build input merged with the vendored OpenAPI specs by build.rs into the
# operation registry. Vanilla OpenAPI cannot express cli_path / dangerous /
# idempotency_sensitive / cursor fields / namespace, so they live here.
# Generated once from docs/v2/commands.md; committed and reviewed thereafter.
#
# namespace: "api" => EXA_API_KEY + api host; "service" => EXA_SERVICE_KEY + admin host (D4).
# idempotency_sensitive: create-POST subject to the no-auto-retry rule (D7/contracts §7).
# dangerous: requires --yes/--confirm before executing (contracts §9).
# confirm: confirmation protocol capability: "yes", "echo_id", or { yes_plus_echo = "delete" }.
# cursor: when set, the command is cursor-paginated with this nextCursor field (contracts §10).

